<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCF Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-text">
    <h1><span class="bold-title">Parul University</span></h1>
    <div class="tagline-box">
        <p>🤔 Yaha Sab Possible Hai ??</p>
    </div>
</div>

<div class="container">
    <h2 class="gradient-text">GCF Detail Form</h2>
    <p class="sub-text">Fill all details correctly</p>

    <form id="form">

        <!-- NAME -->
        <div class="grid">
            <div>
                <input type="text" id="name" placeholder="Full Name">
                <small class="error" id="nameError"></small>
            </div>
            <div>
                <input type="text" id="username" placeholder="Username">
                <small class="error" id="userError"></small>
            </div>
        </div>

        <!-- DOB -->
        <div class="grid">
            <div>
                <input type="date" id="dob">
                <small class="error" id="dobError"></small>
            </div>
            <div>
                <input type="number" id="age" placeholder="Age" readonly>
                <small class="error" id="ageError"></small>
            </div>
        </div>

        <!-- EMAIL -->
        <div class="grid">
            <div>
                <input type="email" id="email" placeholder="Email">
                <small class="error" id="emailError"></small>
            </div>

            <!-- COUNTRY -->
            <div>
                <select id="country">
                    <option value="">Select Country</option>
                    <option value="India">India</option>
                    <option value="Bangladesh">Bangladesh</option>
                    <option value="USA">USA</option>
                </select>
                <small class="error" id="countryError"></small>
            </div>
        </div>

        <!-- PHONE -->
        <div class="grid">
            <div>
                <select id="code">
                    <option value="">Code</option>
                    <option value="+91">+91</option>
                    <option value="+880">+880</option>
                    <option value="+1">+1</option>
                </select>
            </div>
            <div>
                <input type="tel" id="contact" placeholder="Phone Number">
                <small class="error" id="contactError"></small>
            </div>
        </div>

        <!-- GENDER -->
        <div class="gender">
            <label><input type="radio" name="g"> Male</label>
            <label><input type="radio" name="g"> Female</label>
            <label><input type="radio" name="g"> Other</label>
        </div>
        <small class="error" id="genderError"></small>

        <!-- PASSWORD -->
        <div class="grid">
            <div class="pass-box">
                <input type="password" id="password" placeholder="Password">
                <span class="eye" onclick="togglePass('password')">👁</span>
                <small class="error" id="passError"></small>
            </div>

            <div class="pass-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <span class="eye" onclick="togglePass('confirmPassword')">👁</span>
                <small class="error" id="confirmError"></small>
            </div>
        </div>

        <button>Submit</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
